<!doctype html>
<html lang="en">

<head>
  <base href="/">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="Description" content="Demonstration for project-2">

  <style>
    :root, html, body {
      margin: var(--ddd-spacing-0);
      padding: var(--ddd-spacing-0);
      background-color: #FFFAE2;
    }
    project-2:hover {
      box-shadow: var(--ddd-boxShadow-sm);
    }
    #example {
      --project-2-font-size: var(--ddd-font-size-l);
      background-color: var(--ddd-accent-2);
      color: var(--ddd-primary-17);
    }
  </style>
  <title>project-2</title>
</head>

<body>
  <div id="demo">
  </div>
  <script type="module">
    import "./jr-home-page.js";
    import "./jr-teams-page.js";
    import "./jr-about-page.js";
    import "./jr-contact-page.js";
    import "./jr-comet-skippers-page.js";
    import "./jr-indy-air-bears-page.js";
    import "./jr-bouncin-bulldogs-page.js";
    import "./jr-rope-runners-page.js";
    import "./jr-jammin-jump-crew-page.js";

    let routes = {
      "/": "jr-home-page",
    };

    const demo = document.getElementById("demo");

    const normalizePath = (path) => {
      const cleaned = path.replace(/\/+$/, "") || "/";
      return cleaned;
    };

    const sortByOutlineOrder = (a, b) => Number(a.order || 0) - Number(b.order || 0);

    const loadRoutesFromOutline = async () => {
      try {
        const response = await fetch(new URL("./data.json", import.meta.url));
        if (!response.ok) {
          return;
        }

        const data = await response.json();
        if (!Array.isArray(data?.items)) {
          return;
        }

        const pageItems = data.items
          .filter((item) => item?.metadata?.tag && item?.metadata?.route)
          .sort(sortByOutlineOrder);

        if (!pageItems.length) {
          return;
        }

        routes = pageItems.reduce((acc, item) => {
          acc[item.metadata.route] = item.metadata.tag;
          return acc;
        }, {});
      }
      catch (e) {
        // Keep fallback route map if outline cannot be loaded.
      }
    };

    const renderRoute = () => {
      const path = normalizePath(window.location.pathname);
      const tag = routes[path] || routes["/"];
      demo.innerHTML = `<${tag}></${tag}>`;
    };

    document.addEventListener("click", (event) => {
      const link = event.composedPath().find((node) => node?.tagName === "A");
      if (!link) {
        return;
      }

      const href = link.getAttribute("href");
      if (!(href in routes)) {
        return;
      }

      event.preventDefault();
      const currentPath = normalizePath(window.location.pathname);
      const targetPath = normalizePath(href);
      if (currentPath !== targetPath) {
        window.history.pushState({}, "", targetPath);
      }
      renderRoute();
    });

    window.addEventListener("popstate", renderRoute);
    loadRoutesFromOutline().finally(() => {
      renderRoute();
    });
  </script>

  <!-- Take HAX, the Web and you further down the rabbit hole -->
  <style>
    #follow-the-white-rabbit {
      margin: var(--ddd-spacing-4) auto var(--ddd-spacing-16)  var(--ddd-spacing-4);
      background-color: var(--ddd-accent-4);
      color: var(--ddd-theme-default-coalyGray);
    }
    #follow-the-white-rabbit[open] summary {
      background-color: var(--ddd-accent-4) !important;
      color: var(--ddd-theme-default-coalyGray);
    }
    #follow-the-white-rabbit[open] .content {
      padding: var(--ddd-spacing-0) var(--ddd-spacing-4);
    }
    #follow-the-white-rabbit ul,
    #follow-the-white-rabbit li {
      padding: var(--ddd-spacing-0);
      margin: var(--ddd-spacing-0);
    }
    #follow-the-white-rabbit li {
      font-size: var(--ddd-font-size-xs);
      list-style: none;
    }
    #follow-the-white-rabbit li strong,
    #follow-the-white-rabbit li a {
      padding: var(--ddd-spacing-2) var(--ddd-spacing-4);
      color: var(--ddd-theme-default-coalyGray);
      display: block;
      font-weight: var(--ddd-font-weight-bold);
    }
    #follow-the-white-rabbit li:focus-within a,
    #follow-the-white-rabbit li:hover a {
      background-color: var(--ddd-theme-default-coalyGray);
      color: var(--ddd-theme-default-globalNeon);
    }
  </style>
</body>
</html>
